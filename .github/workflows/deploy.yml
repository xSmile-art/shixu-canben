name: Deploy Reader to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'reader/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '10.6.5'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: reader/pnpm-lock.yaml
      - name: Install
        working-directory: reader
        run: pnpm install --frozen-lockfile
      - name: Test
        working-directory: reader
        run: pnpm test
      - name: Build
        working-directory: reader
        run: pnpm build
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reader/dist
