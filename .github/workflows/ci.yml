name: CI

on:
  push:
    branches: [main]
    paths:
      - 'reader/**'
  pull_request:
    paths:
      - 'reader/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '10.6.5'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: reader/pnpm-lock.yaml
      - working-directory: reader
        run: pnpm install --frozen-lockfile
      - working-directory: reader
        run: pnpm test
